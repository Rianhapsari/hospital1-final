<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Sehat Sentosa</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="main-title">
            🏥 RS Sehat Sentosa
        </h1>

        <p class="subtitle">
            Sistem Antrian Digital Rumah Sakit
        </p>
    </div>

    <!-- CURRENT QUEUE -->
    <div class="card queue-card shadow-lg mb-5">
        <div class="card-body text-center">

            <h4 class="mb-3">
                Antrian Sedang Dipanggil
            </h4>

            {% if current %}
                <div class="queue-number">
                    A-{{ current[0] }}
                </div>

                <h5 class="mt-3">
                    {{ current[1] }}
                </h5>
            {% else %}
                <h3>Belum ada antrian</h3>
            {% endif %}

        </div>
    </div>

    <!-- FORM -->
    <div class="card shadow-lg">
        <div class="card-body p-5">

            <h3 class="mb-4 text-center">
                Ambil Nomor Antrian
            </h3>

            <form method="POST" action="/take">

                <div class="mb-4">
                    <input
                        type="text"
                        class="form-control form-control-lg"
                        name="patient_name"
                        placeholder="Masukkan Nama Pasien"
                        required
                    >
                </div>

                <div class="d-grid">
                    <button class="btn btn-primary btn-lg">
                        Ambil Antrian
                    </button>
                </div>

            </form>

        </div>
    </div>

    <div class="text-center mt-4">
        <h5>
            Nomor Terakhir:
            <span class="badge bg-success">
                A-{{ last_queue }}
            </span>
        </h5>
    </div>

    <div class="text-center mt-4">
        <a href="/admin" class="btn btn-dark">
            Masuk Dashboard Admin
        </a>
    </div>

</div>

</body>
</html>
