<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - RS Sehat Sentosa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; }
        .login-container { max-width: 420px; margin-top: 10%; }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-dark">🔑 Dashboard Admin</h3>
                <p class="text-muted small">Silakan masuk menggunakan kredensial rumah sakit</p>
            </div>

            {% if error %}
            <div class="alert alert-danger border-0 small text-center py-2" role="alert">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Username</label>
                    <input type="text" class="form-control" name="username" placeholder="Masukkan username" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Masukkan password" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary fw-bold py-2">Masuk Sistem</button>
                    <a href="/" class="btn btn-link btn-sm text-decoration-none text-muted mt-2">← Kembali ke Layar Utama</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
