<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomor Antrian</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container py-5">

    <div class="card shadow-lg text-center p-5">

        <h2>🎫 Nomor Antrian Anda</h2>

        <div class="display-1 fw-bold text-primary">
            {{prefixes}}-{{ queue_number }}
        </div>

        <h4 class="mt-3">
            {{ patient_name }}
        </h4>

        <h5 class="text-secondary mt-2">
            🩺 {{ category }}
        </h5>

        <div class="mt-4">

            <div class="alert alert-info">
                👥 Antrian Sebelum Anda:
                <strong>{{ people_before }}</strong> pasien
            </div>

            <div class="alert alert-success">
                👨‍⚕️ Dokter:
                <strong>{{ doctor_name }}</strong>
            </div>

            </div>

        <a href="/" class="btn btn-primary mt-4">
            Kembali
        </a>

    </div>

</div>

</body>
</html>
